version: '3.8'

services:
  app:
    build: .
    container_name: baknus_talim_app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongodb:27017/baknus_talim
      - MAILCOW_API_URL=http://mail.smk.baktinusantara666.sch.id
      - MAILCOW_API_KEY=925B68-0FF6BB-36B760-F6C051-AAF343
      - MAILCOW_DOMAIN=smk.baktinusantara666.sch.id
      - MAILCOW_AUTH_METHOD=SMTP
      - MAILCOW_IMAP_PORT=993
      - MAILCOW_SMTP_PORT=465
      - MAILCOW_MAIL_HOST=mail.smk.baktinusantara666.sch.id
      - SESSION_SECRET=baknus_talim_super_secret_session_key_12345
      - PORT=3000
    depends_on:
      - mongodb

  mongodb:
    image: mongo:6.0
    container_name: baknus_talim_db
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
    driver: local
